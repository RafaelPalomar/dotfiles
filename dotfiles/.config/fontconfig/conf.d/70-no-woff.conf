<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  Reject WOFF/WOFF2 web fonts from fontconfig results.
  xdvipdfmx (used by XeLaTeX) cannot embed WOFF into PDF,
  so these must be excluded to avoid build failures.
-->
<fontconfig>
  <selectfont>
    <rejectfont>
      <glob>*.woff</glob>
      <glob>*.woff2</glob>
    </rejectfont>
  </selectfont>
</fontconfig>
